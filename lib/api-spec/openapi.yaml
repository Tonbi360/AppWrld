openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AppWorld API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Browser and mobile authentication endpoints
  - name: apps
    description: PWA app listings
  - name: reviews
    description: User reviews and feedback
  - name: submissions
    description: Developer app submissions
  - name: logbook
    description: Developer logbook entries
  - name: feedback
    description: Platform feedback and suggestions
  - name: admin
    description: Admin curation dashboard
  - name: stats
    description: Platform statistics
  - name: notifications
    description: In-app notification management
  - name: users
    description: User management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /apps:
    get:
      operationId: listApps
      tags: [apps]
      summary: List approved PWA apps
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, trending, top-rated]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppListResponse"

  /apps/featured:
    get:
      operationId: getFeaturedApps
      tags: [apps]
      summary: Get featured/pinned apps
      responses:
        "200":
          description: Featured apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/App"

  /apps/stats-summary:
    get:
      operationId: getAppStatsSummary
      tags: [stats]
      summary: Platform-wide stats summary
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /apps/{id}:
    get:
      operationId: getApp
      tags: [apps]
      summary: Get a single app by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: App detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
        "404":
          description: Not found

  /apps/{id}/track:
    post:
      operationId: trackAppEvent
      tags: [apps]
      summary: Track an anonymous event (view, tryout, install)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackEventInput"
      responses:
        "200":
          description: Tracked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /apps/{id}/check-iframe:
    get:
      operationId: checkIframeSupport
      tags: [apps]
      summary: Check if an app allows iframe embedding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Iframe support check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IframeCheckResult"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for an app
      parameters:
        - name: appId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a thumbs up/down review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}/reply:
    post:
      operationId: replyToReview
      tags: [reviews]
      summary: Developer replies to a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyInput"
      responses:
        "200":
          description: Reply added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /submissions:
    post:
      operationId: submitApp
      tags: [submissions]
      summary: Developer submits a new PWA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSubmissionInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /submissions/scrape-manifest:
    post:
      operationId: scrapeManifest
      tags: [submissions]
      summary: Scrape manifest.json from a URL to auto-fill submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScrapeManifestInput"
      responses:
        "200":
          description: Manifest data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestData"

  /logbook:
    get:
      operationId: listLogbookEntries
      tags: [logbook]
      summary: List developer logbook entries for an app
      parameters:
        - name: appId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Logbook entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogbookEntry"
    post:
      operationId: createLogbookEntry
      tags: [logbook]
      summary: Developer posts a logbook/changelog entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogbookEntryInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogbookEntry"

  /feedback:
    get:
      operationId: listFeedback
      tags: [feedback]
      summary: List platform feedback submissions
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [complaint, suggestion, bug, praise]
        - name: status
          in: query
          schema:
            type: string
            enum: [open, reviewed, resolved]
      responses:
        "200":
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Feedback"
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit feedback or suggestion about the platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "201":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"

  /admin/queue:
    get:
      operationId: getAdminQueue
      tags: [admin]
      summary: Get apps pending manual review
      responses:
        "200":
          description: Review queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"

  /admin/submissions/{id}/approve:
    post:
      operationId: approveSubmission
      tags: [admin]
      summary: Approve a submission to go live
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/submissions/{id}/reject:
    post:
      operationId: rejectSubmission
      tags: [admin]
      summary: Reject a submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/feedback/{id}/status:
    patch:
      operationId: updateFeedbackStatus
      tags: [admin]
      summary: Update feedback status (reviewed/resolved)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /admin/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"

  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to returnTo path on success.

  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /mobile-auth/logout:
    post:
      tags: [auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  /notifications:
    get:
      tags: [notifications]
      operationId: listNotifications
      summary: Get notifications for the authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /notifications/{id}/read:
    patch:
      tags: [notifications]
      operationId: markNotificationRead
      summary: Mark a notification as read
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/clear:
    delete:
      tags: [notifications]
      operationId: clearNotifications
      summary: Clear all notifications for the authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Notifications cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
          format: email
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, developer, admin]

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Notification:
      type: object
      required: [id, userId, title, message, type, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [submission_update, review_reply, app_approved, system]
        isRead:
          type: boolean
        link:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required: [id, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, developer, admin]
        createdAt:
          type: string
          format: date-time

    UpdateRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [user, developer, admin]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    App:
      type: object
      required: [id, name, description, url, iconUrl, category, lighthouseScore, views, tryouts, installs, thumbsUp, thumbsDown, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        uvp:
          type: ["string", "null"]
        url:
          type: string
        iconUrl:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]
        category:
          type: string
        lighthouseScore:
          type: integer
        hasOfflineSupport:
          type: boolean
        hasPushNotifications:
          type: boolean
        isInstallable:
          type: boolean
        views:
          type: integer
        tryouts:
          type: integer
        installs:
          type: integer
        thumbsUp:
          type: integer
        thumbsDown:
          type: integer
        isFeatured:
          type: boolean
        isBoosted:
          type: boolean
        isVerifiedDev:
          type: boolean
        status:
          type: string
          enum: [pending, approved, rejected, hidden]
        createdAt:
          type: string
          format: date-time

    AppDetail:
      allOf:
        - $ref: "#/components/schemas/App"
        - type: object
          properties:
            recentReviews:
              type: array
              items:
                $ref: "#/components/schemas/Review"
            recentLogbook:
              type: array
              items:
                $ref: "#/components/schemas/LogbookEntry"

    AppListResponse:
      type: object
      required: [apps, total, page, limit]
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/App"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Review:
      type: object
      required: [id, appId, vote, comment, isBugReport, ghostName, createdAt]
      properties:
        id:
          type: integer
        appId:
          type: integer
        vote:
          type: string
          enum: [up, down]
        comment:
          type: string
        isBugReport:
          type: boolean
        ghostName:
          type: string
        developerReply:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ReviewInput:
      type: object
      required: [appId, vote, comment, ghostName]
      properties:
        appId:
          type: integer
        vote:
          type: string
          enum: [up, down]
        comment:
          type: string
        isBugReport:
          type: boolean
        ghostName:
          type: string

    ReplyInput:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    Submission:
      type: object
      required: [id, url, name, description, uvp, status, lighthouseScore, createdAt]
      properties:
        id:
          type: integer
        url:
          type: string
        name:
          type: string
        description:
          type: string
        uvp:
          type: string
        iconUrl:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]
        category:
          type: string
        lighthouseScore:
          type: integer
        hasManifest:
          type: boolean
        status:
          type: string
          enum: [received, under_review, needs_info, confirmed, in_progress, fixed, released, rejected, duplicate]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AppSubmissionInput:
      type: object
      required: [url, uvp, category]
      properties:
        url:
          type: string
        uvp:
          type: string
        category:
          type: string
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        iconUrl:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]

    ScrapeManifestInput:
      type: object
      required: [url]
      properties:
        url:
          type: string

    ManifestData:
      type: object
      properties:
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        iconUrl:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]
        hasManifest:
          type: boolean
        lighthouseScore:
          type: integer
        isInstallable:
          type: boolean

    LogbookEntry:
      type: object
      required: [id, appId, content, createdAt]
      properties:
        id:
          type: integer
        appId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    LogbookEntryInput:
      type: object
      required: [appId, content]
      properties:
        appId:
          type: integer
        content:
          type: string

    TrackEventInput:
      type: object
      required: [event]
      properties:
        event:
          type: string
          enum: [view, tryout, install]

    IframeCheckResult:
      type: object
      required: [supportsIframe, url]
      properties:
        supportsIframe:
          type: boolean
        url:
          type: string

    Feedback:
      type: object
      required: [id, type, message, senderType, status, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [complaint, suggestion, bug, praise]
        message:
          type: string
        senderType:
          type: string
          enum: [user, developer]
        senderName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, reviewed, resolved]
        createdAt:
          type: string
          format: date-time

    FeedbackInput:
      type: object
      required: [type, message, senderType]
      properties:
        type:
          type: string
          enum: [complaint, suggestion, bug, praise]
        message:
          type: string
        senderType:
          type: string
          enum: [user, developer]
        senderName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]

    FeedbackStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, reviewed, resolved]

    PlatformStats:
      type: object
      required: [totalApps, totalReviews, totalInstalls, newThisWeek]
      properties:
        totalApps:
          type: integer
        totalReviews:
          type: integer
        totalInstalls:
          type: integer
        newThisWeek:
          type: integer
        topCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    AdminStats:
      type: object
      required: [pendingReviews, totalApps, openFeedback, approvedThisWeek]
      properties:
        pendingReviews:
          type: integer
        totalApps:
          type: integer
        openFeedback:
          type: integer
        approvedThisWeek:
          type: integer

    RejectInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]
