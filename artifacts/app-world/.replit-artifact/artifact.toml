kind = "web"
previewPath = "/"
title = "AppWorld"
version = "1.0.0"
id = "artifacts/app-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25708

[services.development]
run = "pnpm --filter @workspace/app-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app-world", "run", "build" ]
publicDir = "artifacts/app-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25708"
BASE_PATH = "/"
